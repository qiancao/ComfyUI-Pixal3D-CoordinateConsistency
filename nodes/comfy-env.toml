[cuda]
packages = ["flex_gemm_ap", "cumesh_vb", "o_voxel_vb_ap", "flash-attn", "sageattention", "drtk", "natten"]

[dependencies]
av = "*"

[target.linux-64.dependencies]
c-compiler = "*"

[pypi-dependencies]
huggingface_hub = "*"
hf_transfer = "*"
hf_xet = "*"
transformers = ">=4.56.0"
safetensors = "*"
timm = "*"
diffusers = "==0.37.1"
accelerate = "==1.13.0"
kornia = "==0.8.2"
comfy-aimdo = "*"
comfy-sparse-attn = "*"
trimesh = { version = "*", extras = ["easy"] }
plyfile = "*"
zstandard = "*"
psutil = "*"
einops = "*"
pillow = ">=9.0.0"
opencv-python-headless = "*"
imageio = ">=2.0.0"
imageio-ffmpeg = "*"
numpy = ">=1.21.0"
easydict = "*"
tqdm = "*"

[env_vars]
PYTORCH_CUDA_ALLOC_CONF = "expandable_segments:True"
OPENCV_IO_ENABLE_OPENEXR = "1"

[target.linux-64.pypi-dependencies]
triton = ">=3.0.0"

[target.win-64.pypi-dependencies]
triton-windows = ">=3.5.0"
